[video.canvas]
# Fully configurable render resolution.
width = 1920
height = 1080
fps = 30

[video.palette]
# Current visual direction is Solarized Dark.
theme = "solarized_dark"
background_hex = "#002b36"
text_hex = "#fdf6e3"
accent_hex = "#b58900"

[video.text]
# Primary font for floating event text.
font_path = "assets/1942.ttf"

# Design-size bounds before runtime scaling.
font_size_min = 14
font_size_max = 42

# Outline width to preserve readability on the dark background.
stroke_width = 2

# Initial opacity before fade-out.
initial_alpha = 220

# Spawn region is the lower half of the frame.
bottom_spawn_min_ratio = 0.50
bottom_spawn_max_ratio = 0.95

[video.motion]
# Allowed:
# - "vertical"
# - "fixed_angle"
# - "random_angle"
mode = "vertical"

# Used only when mode = "fixed_angle".
# 0.0 means straight upward.
angle_deg = 0.0

# Used only when mode = "random_angle".
random_min_deg = -25.0
random_max_deg = 25.0

# Base movement speed in pixels per second at actual canvas scale.
speed_px_per_sec = 180.0

[outputs]
# Enable RTMP/RTMPS live output.
enable_rtmp = false

# Keep local recording on by default.
enable_local_record = true

# Single encode, multi-output policy.
tee_muxer = true

[outputs.rtmp]
# Leave empty in tracked config.
# Runtime should inject this through SONGH_RTMP_URL or songh.local.toml.
url = ""

# Frozen default container for live output.
container = "flv"

[outputs.record]
enabled = true

# Suggested naming pattern.
# Implementation may resolve {date} and {label} at runtime.
path = "var/songh/records/{date}/{label}.flv"

# Decision: default local recording container is .flv.
container = "flv"

[observe]
# Runtime log verbosity.
log_level = "info"

# Emit periodic runtime stats every N seconds.
emit_stats_every_secs = 30

# Write runtime reports for later tracing and debugging.
write_runtime_report = true
