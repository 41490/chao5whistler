# ghsingo v2 profile (#33).
#
# Ambient mainline. Reads through the v2 path: composer (#30) -> MixerV2
# (#31) with shared-space reverb and the tonal-bed layer (#32). Has no
# [audio.cluster] block by design — the bell-era trigger model is gone.
# Loaded by `cmd/render-audio-v2`; `cmd/live` will pick this up after #34.
#
# Migration from any bell-era profile: run
#   go run ./cmd/migrate-config --in ghsingo.toml --out ghsingo-v2.toml
# and tune from there. See docs/ambient/config.md for the full schema.

[meta]
profile = "ambient-v2"
engine  = "v2"

[archive]
source_dir = "../../ops/assets"
daypack_dir = "../../var/ghsingo/daypack"
target_date = "2026-03-28"

[archive.download]
enabled = false
base_url = "https://data.gharchive.org"
timeout_secs = 60
max_parallel = 4
user_agent = "ghsingo/0.2"

[events]
types = ["PushEvent", "CreateEvent", "IssuesEvent", "PullRequestEvent", "ForkEvent", "ReleaseEvent"]
max_per_second = 4
dedupe_window_secs = 600

[events.weights]
PushEvent = 30
CreateEvent = 40
IssuesEvent = 50
PullRequestEvent = 70
ForkEvent = 80
ReleaseEvent = 100

[audio]
sample_rate = 44100
channels = 2
master_gain_db = 0.0

# Composer (state-vector core, #30). Empty fields fall back to vetted
# composer defaults documented in internal/composer/composer.go.
[composer]
ema_alpha             = 0.06
density_saturation    = 12.0
brightness_saturation = 80.0
phrase_ticks          = 16
accent_cooldown_ticks = 3
accent_base_prob      = 0.10
seed                  = 0

# Mixer (long-lived bus model, #31 + #32). Linear gains in [0, 1].
[mixer]
master_gain     = 0.55
drone_gain      = 1.0
bed_gain        = 1.0
tonal_bed_gain  = 0.575    # -4.8 dB carried over from bell-era cosmos role
accent_gain     = 1.0
wet_continuous  = 0.06
wet_accent      = 0.45
accent_max      = 4

# Assets (v2 ambient layer assignments, #32).
[assets.tonal_bed]
wav_path = "../../ops/assets/sounds/ambient/tonal-bed.wav"
gain_db  = -4.8

[assets.accents]
bank_dir    = "../../ops/assets/sounds/bells/sampled"
synth_decay = 0.996

[video]
width = 1280
height = 720
fps = 15
font_path = "../../ops/assets/3270NerdFontMono-Condensed.ttf"
font_size_min = 14
font_size_max = 42

[video.palette]
background = "#002b36"
text = "#fdf6e3"
accent = "#b58900"

[video.motion]
speed_px_per_sec = 180.0
spawn_y_min = 0.50
spawn_y_max = 0.95

[video.text]
bottom_margin_px = 16
despawn_y_min = 0.18
despawn_y_max = 0.45
scale_grow_per_sec = 0.22
rotation_deg = 90.0

[video.background]
mode = "solid"
sequence_dir = ""
sequence_dirs = []
switch_every_secs = 2.0
fade_secs = 0.2

[video.event_colors]
PushEvent = "#268bd2"
CreateEvent = "#2aa198"
IssuesEvent = "#cb4b16"
PullRequestEvent = "#d33682"
ForkEvent = "#93a1a1"
ReleaseEvent = "#dc322f"

[output]
mode = "local"
video_preset = "ultrafast"
video_bitrate_kbps = 1200
audio_bitrate_kbps = 96

[output.local]
path = "../../var/ghsingo/records/{date}-v2.flv"

[output.rtmps]
url = ""

[observe]
log_level = "info"
emit_stats_every_secs = 30
