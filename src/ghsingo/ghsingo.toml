[meta]
profile = "default"

[archive]
source_dir = "../../ops/assets"
daypack_dir = "../../var/ghsingo/daypack"
target_date = "2026-03-28"

[archive.download]
enabled = false
base_url = "https://data.gharchive.org"
timeout_secs = 60
max_parallel = 4
user_agent = "ghsingo/0.1"

[events]
types = ["PushEvent", "CreateEvent", "IssuesEvent", "PullRequestEvent", "ForkEvent", "ReleaseEvent"]
max_per_second = 4
dedupe_window_secs = 600

[events.weights]
PushEvent = 30
CreateEvent = 40
IssuesEvent = 50
PullRequestEvent = 70
ForkEvent = 80
ReleaseEvent = 100

[audio]
sample_rate = 44100
channels = 2
master_gain_db = 0.0

[audio.bgm]
wav_path = "../../ops/assets/cosmos-leveloop-339.wav"
gain_db = -4.8
loop = true

# Runtime-synthesized beat: BPM follows the last 60 seconds of event density.
# Gain is well below the bell layer (-26 dB) — gentle subliminal anchor only.
[audio.beat]
gain_db = -26.0

# Bell bank: 15 pentatonic pitches (5 note names × 3 octaves).
# Long samples (rank 1 + Release) + Karplus–Strong synth (rank 2-4 fallback).
[audio.bells]
bank_dir = "../../ops/assets/sounds/bells/sampled"
sample_gain_db = -2.0
synth_gain_db  = -4.0
synth_decay    = 0.996

# Per-second event cluster algorithm.
[audio.cluster]
keep_top_n = 4
event_types = ["PushEvent", "CreateEvent", "IssuesEvent", "PullRequestEvent", "ForkEvent"]
always_fire = ["ReleaseEvent"]
velocities = [1.00, 0.75, 0.60, 0.45]
release_velocity = 1.00
octave_rank1    = 4
octave_rank2    = [4, 5]
octave_rank3    = 5
octave_rank4    = 3
octave_release  = 5
spread_ms       = 500

# Surviving voice: ReleaseEvent ocean texture, layered on top of the bell at A5.
[audio.voices.ReleaseEvent]
wav_path = "../../ops/assets/sounds/normalized/ReleaseEvent.wav"
gain_db = 3.1
duration_ms = 2490

[video]
width = 1280
height = 720
fps = 15
font_path = "../../ops/assets/3270NerdFontMono-Condensed.ttf"
font_size_min = 14
font_size_max = 42

[video.palette]
background = "#002b36"
text = "#fdf6e3"
accent = "#b58900"

[video.motion]
speed_px_per_sec = 180.0
spawn_y_min = 0.50
spawn_y_max = 0.95

[video.text]
bottom_margin_px = 16
despawn_y_min = 0.18
despawn_y_max = 0.45
scale_grow_per_sec = 0.22
rotation_deg = 90.0

[video.background]
mode = "solid"
# sequence_dir is kept for backward compatibility; prefer sequence_dirs.
sequence_dir = ""
sequence_dirs = ["../../ops/assets/backgrounds/movpixer/Headspace.Guide.to.Meditation.S01E07.How.to.Deal.with.Anger.1080p"]
switch_every_secs = 2.0
fade_secs = 0.2

[video.event_colors]
PushEvent = "#268bd2"
CreateEvent = "#2aa198"
IssuesEvent = "#cb4b16"
PullRequestEvent = "#d33682"
ForkEvent = "#93a1a1"
ReleaseEvent = "#dc322f"

[output]
mode = "local"
video_preset = "ultrafast"
video_bitrate_kbps = 1200
audio_bitrate_kbps = 96

[output.local]
path = "../../var/ghsingo/records/{date}.flv"

[output.rtmps]
url = ""

[observe]
log_level = "info"
emit_stats_every_secs = 30
