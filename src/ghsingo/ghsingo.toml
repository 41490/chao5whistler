[meta]
profile = "default"

[archive]
source_dir = "../../ops/assets"
daypack_dir = "var/ghsingo/daypack"
target_date = "2026-03-28"

[archive.download]
enabled = false
base_url = "https://data.gharchive.org"
timeout_secs = 60
max_parallel = 4
user_agent = "ghsingo/0.1"

[events]
types = ["PushEvent", "CreateEvent", "IssuesEvent", "PullRequestEvent", "ForkEvent", "ReleaseEvent"]
max_per_second = 4
dedupe_window_secs = 600

[events.weights]
PushEvent = 30
CreateEvent = 40
IssuesEvent = 50
PullRequestEvent = 70
ForkEvent = 80
ReleaseEvent = 100

[audio]
sample_rate = 44100
channels = 2
master_gain_db = 0.0

[audio.bgm]
wav_path = "../../ops/assets/cosmos-leveloop-339.wav"
gain_db = -6.0
loop = true

# Voices: normalized to 44100 Hz mono 16-bit PCM, EBU R128 -23 LUFS.
# Gain offsets are relative to the unified loudness baseline.
[audio.voices.PushEvent]
wav_path = "../../ops/assets/sounds/normalized/PushEvent.wav"
gain_db = 0.0
duration_ms = 830

[audio.voices.CreateEvent]
wav_path = "../../ops/assets/sounds/normalized/CreateEvent.wav"
gain_db = 0.0
duration_ms = 1290

[audio.voices.IssuesEvent]
wav_path = "../../ops/assets/sounds/normalized/IssuesEvent.wav"
gain_db = 1.0
duration_ms = 1490

[audio.voices.PullRequestEvent]
wav_path = "../../ops/assets/sounds/normalized/PullRequestEvent.wav"
gain_db = 1.0
duration_ms = 1500

[audio.voices.ForkEvent]
wav_path = "../../ops/assets/sounds/normalized/ForkEvent.wav"
gain_db = 0.0
duration_ms = 670

[audio.voices.ReleaseEvent]
wav_path = "../../ops/assets/sounds/normalized/ReleaseEvent.wav"
gain_db = 2.0
duration_ms = 2490

[video]
width = 1280
height = 720
fps = 30
font_path = "../../ops/assets/3270NerdFontMono-Condensed.ttf"
font_size_min = 14
font_size_max = 42

[video.palette]
background = "#002b36"
text = "#fdf6e3"
accent = "#b58900"

[video.motion]
speed_px_per_sec = 180.0
spawn_y_min = 0.50
spawn_y_max = 0.95

[output]
mode = "local"
video_preset = "ultrafast"
video_bitrate_kbps = 2500
audio_bitrate_kbps = 128

[output.local]
path = "var/ghsingo/records/{date}.flv"

[output.rtmps]
url = ""

[observe]
log_level = "info"
emit_stats_every_secs = 30
